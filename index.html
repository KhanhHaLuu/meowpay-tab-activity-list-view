<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeowPay — Bill Created</title>

  <!-- Google Fonts (matching Activity List View) -->
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ======== CSS VARIABLES (Activity List View tokens) ======== */
    :root {
      --primary: #D4881A;
      --primary-soft: #E8A94A;
      --primary-container: #FFF5E6;
      --indigo: #4350B5;
      --indigo-deep: #2D3A8C;
      --indigo-light: #ECEEFF;
      --surface: #FDFBF8;
      --surface-dim: #F6F3EF;
      --surface-container: #EFECE8;
      --on-surface: #1A1816;
      --on-surface-variant: #57534E;
      --on-surface-subtle: #9C9590;
      --outline: #8C877F;
      --outline-variant: #D6D1CA;
      --muted: #A8A29E;
      --font-display: 'Bricolage Grotesque', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --shape-full: 9999px;
      --shape-xl: 24px;
      --shape-lg: 20px;
      --shape-md: 14px;
      --shape-sm: 10px;
    }

    /* ======== RESET ======== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: var(--font-body);
      background-color: #E8E4DF;
    }

    /* ======== CONTAINER ======== */
    .container {
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      min-height: 100vh;
    }

    /* ======== PHONE FRAME ======== */
    .phone-frame {
      position: relative;
      width: 375px;
      height: 812px;
      background-color: #FFFFFF;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
      display: flex;
      flex-direction: column;
    }

    /* ======== STATUS BAR ======== */
    .status-bar {
      height: 54px;
      padding: 14px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .status-time {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 15px;
      color: var(--on-surface);
      letter-spacing: -0.01em;
    }
    .status-icons {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .status-icons svg { height: 12px; fill: var(--on-surface); }

    /* ======== NAV BAR ======== */
    .nav-bar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
    }
    .nav-title {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 17px;
      color: var(--on-surface);
      letter-spacing: -0.2px;
    }

    /* ======== SCREEN CONTENT ======== */
    .screen-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 32px;
      position: relative;
    }

    /* ======== SUCCESS CHECKMARK ======== */
    .checkmark-ring {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 4px 16px rgba(212, 136, 26, 0.25);
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s both;
    }
    .checkmark-ring svg {
      width: 24px;
      height: 24px;
      stroke: white;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .check-path {
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
      animation: drawCheck 0.35s ease-out 0.6s forwards;
    }

    @keyframes scaleIn {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ======== HEADING ======== */
    .heading {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 26px;
      color: var(--on-surface);
      text-align: center;
      line-height: 1.25;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      animation: fadeUp 0.45s ease-out 0.35s both;
    }

    .subheading {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 14px;
      color: var(--on-surface-subtle);
      text-align: center;
      line-height: 1.5;
      animation: fadeUp 0.45s ease-out 0.48s both;
    }

    /* ======== ILLUSTRATION ======== */
    .illustration {
      margin-top: 28px;
      animation: fadeUp 0.5s ease-out 0.55s both;
    }
    .illustration img {
      width: 200px;
      height: auto;
      object-fit: contain;
    }

    /* ======== BOTTOM SECTION ======== */
    .bottom-section {
      flex-shrink: 0;
      padding: 16px 24px 0;
    }

    /* ======== CTA BUTTON ======== */
    .cta-btn {
      width: 100%;
      height: 56px;
      border: none;
      border-radius: var(--shape-full);
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--primary);
      color: #fff;
      box-shadow: 0 2px 12px rgba(212, 136, 26, 0.30);
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.45s ease-out 0.7s both;
    }
    .cta-btn:hover {
      box-shadow: 0 4px 20px rgba(212, 136, 26, 0.40);
      transform: translateY(-1px);
    }
    .cta-btn:active {
      transform: scale(0.985);
      box-shadow: 0 1px 8px rgba(212, 136, 26, 0.25);
    }
    .cta-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* ======== HOME INDICATOR ======== */
    .home-indicator {
      height: 34px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 10px;
      flex-shrink: 0;
    }
    .home-indicator-bar {
      width: 134px;
      height: 5px;
      background: var(--on-surface);
      border-radius: 3px;
      opacity: 0.18;
    }

    /* ======== ANNOTATION BADGE ======== */
    .annotation {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(67, 80, 181, 0.08);
      border: 1px solid rgba(67, 80, 181, 0.15);
      color: var(--indigo);
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 8px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      z-index: 20;
    }
  </style>
</head>
